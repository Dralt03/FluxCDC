# FluxCDC configuration
# Copy this file to config.yaml and fill in your credentials.

event_store:
  dsn: "postgres://fluxcdc:fluxcdc@localhost:5432/fluxcdc?sslmode=disable"

kafka:
  brokers:
    - "localhost:9092"
  topic: "cdc.events"

connectors:
  - id: "orders-poller"
    type: "poll"
    source_dsn: "postgres://user:password@source-host:5432/mydb?sslmode=disable"
    database: "mydb"
    table: "orders"
    watermark_column: "updated_at"   # Must be an indexed TIMESTAMPTZ column
    primary_key: "id"
    poll_interval: "5s"
    batch_size: 100
